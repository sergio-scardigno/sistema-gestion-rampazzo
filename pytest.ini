[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Tests unitarios (sin dependencias externas)
    integration: Tests de integracion (SQLite temporal)
    ui: Smoke tests de UI (requiere PySide6)
    slow: Tests lentos
addopts = -v --tb=short --strict-markers
